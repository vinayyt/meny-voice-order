<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --paper:#FBF7EE; --cream:#F4EEE2; --cream-2:#ECE4D2;
  --ink:#1F1B14; --ink-2:#4A4438; --ink-3:#8A8170;
  --hair:rgba(31,27,20,0.12); --hair-2:rgba(31,27,20,0.06);
  --meny:#D62828; --meny-deep:#B01E1E; --meny-soft:#FAEAEA;
  --moss:#4A6A42; --moss-deep:#2D4A2D; --moss-soft:#EEF5EE;
  --ai-1:oklch(0.78 0.07 295); --ai-2:oklch(0.84 0.05 200);
  --ai-3:oklch(0.86 0.05 145); --ai-bubble:#F2F0FF;
  --serif:'Newsreader',Georgia,serif; --sans:'Manrope',-apple-system,sans-serif;
  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-pill:999px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--cream);}
body{font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;}
#root{height:100%;display:flex;justify-content:center;align-items:stretch;background:var(--cream-2);}
.app-shell{
  width:100%;max-width:430px;height:100%;
  display:flex;flex-direction:column;position:relative;overflow:hidden;
  background:var(--cream);
  box-shadow:0 0 80px rgba(31,27,20,0.12);
}
button{font-family:var(--sans);cursor:pointer;border:none;background:transparent;color:inherit;}
input,textarea{font-family:var(--sans);font-size:16px;}
.scroll{overflow-y:auto;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}

/* FIX #13: Loading screen (shown before Babel parses) */
#app-loading{
  position:fixed;inset:0;background:var(--cream);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;z-index:999;
}
#app-loading .logo{font-family:-apple-system,sans-serif;font-weight:900;font-size:28px;letter-spacing:.12em;color:#D62828;}
#app-loading .dots{display:flex;gap:6px;}
#app-loading .dot{width:7px;height:7px;border-radius:50%;background:#D62828;animation:ldot 1.2s ease-in-out infinite;}
#app-loading .dot:nth-child(2){animation-delay:.15s;}
#app-loading .dot:nth-child(3){animation-delay:.3s;}
@keyframes ldot{0%,60%,100%{transform:scale(0.6);opacity:.4}30%{transform:scale(1);opacity:1}}

/* Animations */
@keyframes breathe{0%,100%{transform:scale(1) rotate(0deg)}33%{transform:scale(1.06) rotate(2deg)}66%{transform:scale(0.97) rotate(-2deg)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.08);opacity:1}}
@keyframes wave{0%,100%{transform:scaleY(0.35)}50%{transform:scaleY(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes dot{0%,60%,100%{opacity:.2;transform:translateY(0)}30%{opacity:1;transform:translateY(-2px)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}

.fade-up{animation:fadeUp .3s ease-out both;}
.slide-up{animation:slideUp .32s cubic-bezier(0.22,1,0.36,1);}
.slide-in{animation:slideIn .28s ease-out both;}

/* AI orb gradient */
.ai-orb{
  background:
    radial-gradient(65% 80% at 30% 28%, var(--ai-1), transparent 68%),
    radial-gradient(55% 70% at 72% 58%, var(--ai-2), transparent 68%),
    radial-gradient(60% 65% at 52% 88%, var(--ai-3), transparent 68%),
    var(--paper);
  position:relative;
}
.ai-orb::after{
  content:'';position:absolute;inset:14%;border-radius:50%;
  background:radial-gradient(40% 42% at 35% 30%,rgba(255,255,255,.65),transparent 70%);
  filter:blur(2px);
}
.orb-breathe{animation:breathe 6s ease-in-out infinite;}
.orb-pulse{animation:pulse 1.3s ease-in-out infinite;}

/* Buttons */
.btn{
  appearance:none;border:none;cursor:pointer;
  border-radius:var(--r-pill);padding:13px 22px;
  font-family:var(--sans);font-weight:600;font-size:15px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .14s,background .14s,box-shadow .18s;
}
.btn:active{transform:scale(.97);}
.btn-meny{background:var(--meny);color:#fff;}
.btn-meny:hover{background:var(--meny-deep);}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--hair);}
.btn-ghost:hover{background:var(--paper);}
.btn-soft{background:var(--paper);color:var(--ink);border:1px solid var(--hair-2);}

/* Chips */
.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--r-pill);
  background:var(--paper);border:1px solid var(--hair);
  font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;
  transition:background .14s;
}
.chip:hover{background:var(--cream-2);}
.chip:active{transform:scale(.97);}

/* Tag pill */
.tag{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  padding:3px 8px;border-radius:var(--r-pill);
  font-family:monospace;
}
.tag-meny{background:var(--meny-soft);color:var(--meny);}
.tag-moss{background:var(--moss-soft);color:var(--moss-deep);}
.tag-ai{background:var(--ai-bubble);color:oklch(0.42 0.1 280);}

/* Scrollable horizontal strip */
.h-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.h-scroll::-webkit-scrollbar{display:none;}

/* Demo banner */
.demo-banner{
  background:#FFF8E1;border-bottom:1px solid #FFE082;
  padding:8px 16px;font-size:12px;color:#795548;
  display:flex;align-items:center;gap:6px;
}
</style>
</head>

// FIX #14: Error Boundary
// ═══════════════════════════════════════════════════════════════════
class ErrorBoundary extends React.Component {
  state = { error: null };
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding:32, textAlign:'center', fontFamily:'sans-serif' }}>
          <div style={{ fontSize:40, marginBottom:16 }}>⚠️</div>
          <div style={{ fontSize:18, fontWeight:700, marginBottom:8 }}>Noe gikk galt</div>
          <div style={{ fontSize:13, color:'#666', marginBottom:24 }}>{this.state.error.message}</div>
          <button onClick={() => window.location.reload()}
            style={{ padding:'10px 20px', background:'#D62828', color:'#fff', border:'none', borderRadius:8, cursor:'pointer', fontWeight:600 }}>
            Last inn på nytt
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

// Render simple markdown (bold, italic, line breaks) safely — no dangerouslySetInnerHTML.
// Returns a <span> wrapping the parsed content (never a bare array).
function renderMarkdown(text) {
  if (!text) return React.createElement('span', null);
  const elements = [];
  const re = /(\*\*(.+?)\*\*|\*(.+?)\*|\n)/g;
  let last = 0, match, key = 0;
  while ((match = re.exec(text)) !== null) {
    if (match.index > last) elements.push(text.slice(last, match.index));
    if (match[0] === '\n') {
      elements.push(React.createElement('br', { key: key++ }));
    } else if (match[0].startsWith('**')) {
      elements.push(React.createElement('strong', { key: key++ }, match[2]));
    } else {
      elements.push(React.createElement('em', { key: key++ }, match[3]));
    }
    last = match.index + match[0].length;
  }
  if (last < text.length) elements.push(text.slice(last));
  return React.createElement('span', null, ...elements);
}

// Normalise a product name to its root word for fuzzy matching.
// "Tomater 400g", "ferske Tomater", "TOMATER" all → "tomater"
function normName(name) {
  return name.toLowerCase()
    .replace(/\b\d+\s*(g|kg|ml|l|stk|pk|cl)\b/gi, '') // strip weights/units
    .replace(/\b(fersk[et]?|norsk[et]?|økologisk[et]?)\b/gi, '') // strip adjectives
    .replace(/\s+/g, ' ').trim();
}

function mergeCart(existing, newItems) {
  const merged = [...existing];
  newItems.forEach(item => {
    // 1. Exact match (case-insensitive)
    let idx = merged.findIndex(i => i.name.toLowerCase() === item.name.toLowerCase());
    // 2. Fuzzy match on normalised root name
    if (idx < 0) idx = merged.findIndex(i => normName(i.name) === normName(item.name));
    if (idx >= 0) {
      merged[idx] = { ...merged[idx], qty: merged[idx].qty + item.qty };
    } else {
      merged.push({ ...item, id: `${Date.now()}-${Math.random().toString(36).slice(2)}` });
    }
  });
  return merged;
}

// FIX #3: speak only when fromVoice
function speak(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/[*#_`<>]/g, '').substring(0, 400);
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = SPEECH_LOCALE[lang] || 'en-US';
  u.rate = 1.05;
  window.speechSynthesis.speak(u);
}

function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

// Dropdown language picker — shows all 4 languages, checkmark on current.
function LangPicker({ lang, onChange }) {
  const [open, setOpen] = useState(false);
  const [pos, setPos] = useState({ top:0, right:0 });
  const btnRef = React.useRef(null);

  useEffect(() => {
    if (!open) return;
    const rect = btnRef.current?.getBoundingClientRect();
    if (rect) setPos({ top: rect.bottom + 6, right: window.innerWidth - rect.right });
    const close = (e) => { if (!e.target.closest('[data-langpicker]')) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [open]);

  return (
    <div style={{ position:'relative' }}>
      <button
        ref={btnRef}
        className="chip"
        style={{ padding:'5px 10px', gap:5, fontSize:12 }}
        onClick={() => setOpen(o => !o)}
        aria-haspopup="listbox"
        aria-expanded={open}
      >
        <I.lang size={13}/>
        <span>{LANG_LABELS[lang]}</span>
        <span style={{ fontSize:9, opacity:.55, marginLeft:1 }}>▾</span>
      </button>

      {open && (
        <div data-langpicker role="listbox" style={{
          position:'fixed', top: pos.top, right: pos.right,
          background:'var(--paper)', border:'1px solid var(--hair)',
          borderRadius:'var(--r-md)', boxShadow:'0 8px 28px rgba(31,27,20,.14)',
          minWidth:148, zIndex:1000, overflow:'hidden',
        }}>
          {LANGS.map(l => (
            <button
              key={l}
              role="option"
              aria-selected={l === lang}
              onClick={() => { onChange(l); setOpen(false); }}
              style={{
                display:'flex', alignItems:'center', gap:9, width:'100%',
                padding:'11px 14px', border:'none', background:'transparent',
                cursor:'pointer', textAlign:'left', fontFamily:'var(--sans)',
                fontSize:14, fontWeight: l === lang ? 700 : 400,
                color: l === lang ? 'var(--meny)' : 'var(--ink)',
                transition:'background .1s',
              }}
              onMouseOver={e => e.currentTarget.style.background = 'var(--cream)'}
              onMouseOut={e  => e.currentTarget.style.background = 'transparent'}
            >
              <span style={{ width:16, flexShrink:0, display:'flex', alignItems:'center' }}>
                {l === lang && <I.check size={14} sw={2.5}/>}
              </span>
              {LANG_LABELS[l]}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function AIOrb({ size=80, phase='idle' }) {
  const animClass = phase === 'listening' ? 'orb-pulse' : 'orb-breathe';
  const shadow = phase === 'listening'
    ? '0 0 0 14px rgba(197,188,255,.18), 0 0 0 28px rgba(197,188,255,.08)'
    : '0 8px 32px rgba(31,27,20,.12)';
  return (
    <div className={`ai-orb ${animClass}`} style={{
      width:size, height:size, borderRadius:'50%', flexShrink:0,
      boxShadow:shadow, transition:'box-shadow .3s ease',

// VOICE OVERLAY
// FIX #1: stale closure fixed with transcriptRef
// ═══════════════════════════════════════════════════════════════════
// Locales not supported by browser Web Speech API — fall back to en-US
const SPEECH_UNSUPPORTED = ['kn-IN'];

function VoiceOverlay({ lang, onClose, onTranscript }) {
  const [phase, setPhase] = useState('idle'); // idle | listening | processing | unsupported | error
  const [displayTranscript, setDisplayTranscript] = useState('');
  const [usingFallback, setUsingFallback] = useState(false);
  const transcriptRef = useRef('');   // always current — never stale in callbacks
  const recRef = useRef(null);
  const t = T[lang];

  const startWithLocale = (locale, isFallback = false) => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setPhase('unsupported'); return; }
    const rec = new SR();
    rec.lang = locale;
    rec.continuous = false;
    rec.interimResults = true;

    rec.onstart = () => {
      transcriptRef.current = '';
      setDisplayTranscript('');
      setUsingFallback(isFallback);
      setPhase('listening');
    };

    rec.onresult = e => {
      const txt = Array.from(e.results).map(r => r[0].transcript).join('');
      transcriptRef.current = txt;
      setDisplayTranscript(txt);
    };

    rec.onend = () => {
      if (recRef.current === rec && transcriptRef.current) {
        setPhase('processing');
        setTimeout(() => {
          onTranscript(transcriptRef.current);
          onClose();
        }, 700);
      } else {
        setPhase('idle');
      }
    };

    rec.onerror = (e) => {
      transcriptRef.current = '';
      // If the locale isn't supported, retry automatically with en-US
      if (e.error === 'language-not-supported' && locale !== 'en-US') {
        recRef.current = null;
        startWithLocale('en-US', true);
        return;
      }
      setPhase('error');
      setTimeout(() => setPhase('idle'), 3000);
    };

    rec.start();
    recRef.current = rec;
  };

  const start = () => {
    const locale = SPEECH_LOCALE[lang] || 'en-US';
    const isFallback = SPEECH_UNSUPPORTED.includes(locale);
    startWithLocale(isFallback ? 'en-US' : locale, isFallback);
  };

  const stop = () => {
    recRef.current?.stop();
    if (!transcriptRef.current) setPhase('idle');
  };

  const handleMic = () => {
    if (phase === 'idle') start();
    else if (phase === 'listening') stop();
    else onClose();
  };

  return (
    <div className="slide-up" style={{
      position:'absolute', inset:0, zIndex:60,
      background:'linear-gradient(180deg, oklch(0.94 0.025 290), var(--cream) 55%)',
      display:'flex', flexDirection:'column', padding:'48px 24px 36px',
    }}>
      {/* header */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <button onClick={onClose} style={{
          width:36, height:36, borderRadius:'50%', border:'1px solid var(--hair)',
          background:'var(--paper)', display:'grid', placeItems:'center',
        }}><I.close size={17}/></button>
        <span style={{ fontFamily:'monospace', fontSize:11, letterSpacing:'.1em', textTransform:'uppercase', color:'var(--ink-3)' }}>
          {phase === 'listening' ? t.listening : phase === 'processing' ? t.processing : t.tapSpeak}
        </span>
        <div style={{ width:36 }}/>
      </div>

      {/* orb */}
      <div style={{ flex:1, display:'grid', placeItems:'center' }}>
        <div style={{ position:'relative', textAlign:'center' }}>
          {[0,1,2].map(i => (
            <div key={i} className={`ai-orb ${phase==='listening'?'orb-pulse':'orb-breathe'}`} style={{
              position: i===0 ? 'relative' : 'absolute',
              inset: i===0 ? 'auto' : `${i*14}px`,
              width: i===0 ? 180 : 'auto', height: i===0 ? 180 : 'auto',
              borderRadius:'50%',
              opacity: 0.28 + i * 0.28,
              animationDelay:`${i*.18}s`,
              ...(i===0 ? {} : { pointerEvents:'none' }),
            }}/>
          ))}
        </div>
      </div>

      {/* transcript / status */}
      <div style={{ minHeight:110, marginBottom:20 }}>
        {phase === 'unsupported' && (
          <div style={{ textAlign:'center', padding:'0 8px' }}>
            <div style={{ fontSize:48, marginBottom:14 }}>🎙️</div>
            <div style={{ fontFamily:'var(--serif)', fontSize:20, marginBottom:10 }}>
              {t.voiceUnsupportedTitle}
            </div>
            <div style={{ fontSize:14, color:'var(--ink-2)', lineHeight:1.55, marginBottom:20 }}>
              {t.voiceUnsupportedBody}
            </div>
            <button className="btn btn-ghost" onClick={onClose}>
              {t.voiceUnsupportedBack}
            </button>
          </div>
        )}
        {phase === 'error' && (
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:40, marginBottom:12 }}>⚠️</div>
            <div style={{ fontFamily:'var(--serif)', fontSize:18, marginBottom:8 }}>
              {t.voiceMicError}
            </div>
            <div style={{ fontSize:13, color:'var(--ink-3)' }}>
              {t.voiceMicErrorBody}
            </div>
          </div>
        )}
        {phase === 'idle' && (
          <div style={{ textAlign:'center' }}>
            <div style={{ fontFamily:'var(--serif)', fontSize:22, marginBottom:8 }}>
              {t.voiceIdleTitle}
            </div>
            <div style={{ fontSize:13, color:'var(--ink-3)', marginBottom:16 }}>
              {t.voiceIdleBody}
            </div>
            <div style={{ fontSize:12, color:'var(--ink-3)', marginBottom:8 }}>{t.tryAsking}</div>
            <div className="h-scroll" style={{ justifyContent:'center', flexWrap:'wrap', gap:6 }}>
              {t.suggestions.map((s,i) => (
                <span key={i} className="chip" style={{ fontSize:12 }}
                  onClick={()=>{ transcriptRef.current = s; onTranscript(s); onClose(); }}>
                  «{s}»
                </span>
              ))}
            </div>
          </div>
        )}
        {phase === 'listening' && (
          <div>
            <div style={{ fontFamily:'monospace', fontSize:11, letterSpacing:'.1em', textTransform:'uppercase', color:'var(--ink-3)', marginBottom:8 }}>{t.youSaid}</div>
            <div style={{ fontFamily:'var(--serif)', fontSize:22, lineHeight:1.3, marginBottom:12, minHeight:32 }}>
              {displayTranscript || '…'}
              <span style={{
                display:'inline-block', width:2, height:20, marginLeft:2,
                background:'var(--meny)', verticalAlign:'middle',
                animation:'pulse .8s ease-in-out infinite',
              }}/>
            </div>
            <Waveform active bars={24} color="var(--meny)"/>
            {usingFallback && (
              <div style={{
                marginTop:14, padding:'8px 12px', borderRadius:'var(--r-sm)',
                background:'var(--cream-2)', fontSize:12, color:'var(--ink-3)',
                display:'flex', alignItems:'center', gap:6,
              }}>
                <I.info size={13}/> {t.voiceFallback}
              </div>
            )}
          </div>
        )}
        {phase === 'processing' && (
          <div style={{ textAlign:'center' }}>
            <div style={{ fontFamily:'var(--serif)', fontSize:20, color:'var(--ink-2)', marginBottom:8 }}>{displayTranscript}</div>
            <div style={{ color:'var(--ink-3)', fontSize:13 }}>{t.processing}</div>
          </div>
        )}
      </div>

      {/* mic button — hidden when unsupported */}
      <div style={{ display:'flex', justifyContent:'center' }}>
        <button onClick={handleMic} style={{
          display: phase === 'unsupported' ? 'none' : 'grid',
          width:80, height:80, borderRadius:'50%', border:'none', cursor:'pointer',
          background: phase==='listening' ? 'var(--meny)' : 'var(--paper)',
          color: phase==='listening' ? '#fff' : 'var(--meny)',
          display:'grid', placeItems:'center',
          boxShadow: phase==='listening'
            ? '0 0 0 8px rgba(214,40,40,.18), 0 0 0 16px rgba(214,40,40,.08), 0 8px 24px rgba(214,40,40,.3)'
            : '0 2px 12px rgba(31,27,20,.1), 0 0 0 1px var(--hair)',
          transition:'all .2s ease',
          animation: phase==='listening' ? 'pulse 1.6s ease-in-out infinite' : 'none',
        }}>
          {phase==='listening' ? <I.mic size={34}/> : <I.mic size={30}/>}
        </button>
      </div>
    </div>
  );
}

function OrderFormModal({ cart, lang, onClose, onSend, sending }) {
  const [name, setName]       = useState('');
  const [email, setEmail]     = useState('');
  const [phone, setPhone]     = useState('');
  const [address, setAddress] = useState('');
  const [notes, setNotes]     = useState('');
  const [err, setErr]         = useState('');
  const [fieldErrors, setFieldErrors] = useState({});
  const t = T[lang] || T.en;
  const total = cart.reduce((s,i) => s + (i.price||0)*i.qty, 0);

  const submit = () => {
    const errs = {};
    if (!name.trim()) errs.name = true;
    if (!email.trim()) errs.email = true;
    else if (!isValidEmail(email)) errs.email = true;
    if (!address.trim()) errs.address = true;
    if (Object.keys(errs).length > 0) {
      setFieldErrors(errs);
      setErr(!isValidEmail(email) && email.trim() ? t.invalidEmail : t.required);
      return;
    }
    setFieldErrors({});
    setErr('');
    onSend({ name, email, phone, address, notes });
  };

  const inputStyle = (field) => ({
    width:'100%', padding:'12px 14px', borderRadius:'var(--r-sm)',
    border: `1px solid ${fieldErrors[field] ? 'var(--meny)' : 'var(--hair)'}`,
    background: fieldErrors[field] ? 'var(--meny-soft)' : 'var(--paper)',
    fontSize:16, outline:'none', fontFamily:'var(--sans)',
    transition:'border-color .15s, background .15s',
  });

  return (
    <div style={{
      position:'absolute', inset:0, zIndex:70,
      background:'rgba(31,27,20,.5)',
      display:'flex', flexDirection:'column', justifyContent:'flex-end',
    }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="slide-up" style={{
        background:'var(--paper)', borderRadius:'20px 20px 0 0',
        maxHeight:'92%', display:'flex', flexDirection:'column',
        paddingBottom:`calc(24px + var(--safe-b))`,
      }}>
        <div style={{ display:'flex', justifyContent:'center', padding:'10px 0 4px' }}>
          <div style={{ width:36, height:4, borderRadius:99, background:'var(--cream-2)' }}/>
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'4px 20px 16px' }}>
          <div style={{ fontFamily:'var(--serif)', fontSize:22 }}>{t.sendOrder}</div>
          <button onClick={onClose} style={{ width:34, height:34, borderRadius:'50%', border:'1px solid var(--hair)', background:'var(--cream)', display:'grid', placeItems:'center' }}>
            <I.close size={16}/>
          </button>
        </div>

        <div className="scroll" style={{ flex:1, padding:'0 20px', overflowY:'auto' }}>
          {/* cart summary */}
          <div style={{ background:'var(--cream)', borderRadius:'var(--r-sm)', padding:'12px 14px', marginBottom:20, border:'1px solid var(--hair-2)' }}>
            <div style={{ fontSize:12, color:'var(--ink-3)', marginBottom:6 }}>
              {cart.length} {t.items}{total > 0 ? ` · ${total} kr` : ''}
            </div>
            <div style={{ fontSize:13, color:'var(--ink-2)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
              {cart.slice(0,3).map(i=>i.name).join(', ')}{cart.length > 3 ? ` +${cart.length-3}` : ''}
            </div>
          </div>

          {/* fields */}
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <input style={inputStyle('name')} placeholder={t.name} value={name}
              onChange={e=>{setName(e.target.value); setFieldErrors(p=>({...p,name:false}));}}/>
            <input style={inputStyle('email')} placeholder={t.email} type="email" value={email}
              onChange={e=>{setEmail(e.target.value); setFieldErrors(p=>({...p,email:false}));}}/>
            <input style={inputStyle('phone')} placeholder={t.phone} type="tel" value={phone}
              onChange={e=>setPhone(e.target.value)}/>
            {/* Delivery address with icon + hint */}
            <div>
              <div style={{ position:'relative' }}>
                <I.pin size={16} style={{ position:'absolute', left:13, top:'50%', transform:'translateY(-50%)', color: fieldErrors.address ? 'var(--meny)' : 'var(--ink-3)', pointerEvents:'none' }}/>
                <input style={{ ...inputStyle('address'), paddingLeft:36 }} placeholder={t.address} value={address}
                  onChange={e=>{setAddress(e.target.value); setFieldErrors(p=>({...p,address:false}));}}/>
              </div>
              <div style={{ fontSize:11, color:'var(--ink-3)', marginTop:4, paddingLeft:2 }}>{t.addressHint}</div>
            </div>
            <textarea style={{ ...inputStyle('notes'), height:76, resize:'none' }} placeholder={t.notes} value={notes}
              onChange={e=>setNotes(e.target.value)}/>
          </div>

          {err && (
            <div style={{ marginTop:12, padding:'10px 14px', background:'var(--meny-soft)', color:'var(--meny)', borderRadius:'var(--r-sm)', fontSize:13 }}>
              {err}
            </div>
          )}

          <div style={{ marginTop:10, fontSize:11, color:'var(--ink-3)' }}>
            {t.requiredFields}
          </div>
        </div>

        <div style={{ padding:'16px 20px 0' }}>
          <button className="btn btn-meny" style={{ width:'100%', height:52 }} onClick={submit} disabled={sending}>
            {sending
              ? <><span style={{ animation:'shimmer 1s infinite' }}>●●●</span></>
              : <><I.mail size={18}/> {t.sendOrder}{total>0?` · ${total} kr`:''}</>}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// CHAT SCREEN
// FIX #10: suggestedReplies chips shown after AI responds
// ═══════════════════════════════════════════════════════════════════
function ChatScreen({
  messages, isLoading, cart, lang, isDemo,
  onSend, onVoice, onCartOpen, onLangChange, suggestedReplies, onClearSuggestions, onHome, onClearChat,
}) {
  const [input, setInput] = useState('');
  const bottomRef = useRef(null);
  const t = T[lang] || T.en;
  const cartCount = cart.reduce((s,i) => s+i.qty, 0);
  const hr = new Date().getHours();
  const greeting = hr < 12 ? t.morningGreeting : hr < 18 ? t.afternoonGreeting : t.eveningGreeting;

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:'smooth' });
  }, [messages, isLoading, suggestedReplies]);

  const submit = () => {
    if (input.trim()) { onClearSuggestions(); onSend(input, false); setInput(''); }
  };

  const handleChip = (value) => {
    onClearSuggestions();
    if (value === '__OPEN_CART__') { onCartOpen(); return; }
    onSend(value, false);
  };

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:'var(--cream)' }}>
      {/* demo banner */}
      {isDemo && (
        <div className="demo-banner">
          <I.info size={14}/> {t.demoMode}
        </div>
      )}

      {/* header */}
      <div style={{
        display:'flex', alignItems:'center', gap:10, padding:'16px 16px 12px',
        background:'rgba(244,238,226,.92)', backdropFilter:'blur(20px)',
        borderBottom:'1px solid var(--hair-2)',
      }}>
        <button
          onClick={onHome}
          title="Tilbake til start"
          style={{
            flex:1, display:'flex', alignItems:'center', gap:7,
            background:'none', border:'none', padding:0, cursor:'pointer',
            fontFamily:'var(--sans)', fontWeight:900, fontSize:20,
            letterSpacing:'.1em', color:'var(--meny)',
          }}
        >
          <span style={{ opacity:.5, flexShrink:0, display:'flex', alignItems:'center' }}>
            <I.back size={15}/>
          </span>
          MENY
        </button>
        <LangPicker lang={lang} onChange={onLangChange}/>
        {(messages.length > 0 || cartCount > 0) && (
          <button
            onClick={() => { if (window.confirm(t.clearChatConfirm)) onClearChat(); }}
            title={t.clearChat}
            style={{
              width:38, height:38, borderRadius:'50%',
              border:'1px solid var(--hair)', background:'var(--paper)',
              display:'grid', placeItems:'center', cursor:'pointer',
              color:'var(--ink-3)', flexShrink:0,
              transition:'color .15s, background .15s',
            }}
            onMouseEnter={e => { e.currentTarget.style.color='var(--meny)'; e.currentTarget.style.background='var(--meny-soft)'; }}
            onMouseLeave={e => { e.currentTarget.style.color='var(--ink-3)'; e.currentTarget.style.background='var(--paper)'; }}
          >
            <I.compose size={16}/>
          </button>
        )}
        <button onClick={onCartOpen} style={{
          position:'relative', width:38, height:38, borderRadius:'50%',
          border:'1px solid var(--hair)', background:'var(--paper)',
          display:'grid', placeItems:'center', cursor:'pointer',
        }}>
          <I.cart size={18}/>
          {cartCount > 0 && (
            <span style={{
              position:'absolute', top:-4, right:-4,
              minWidth:18, height:18, borderRadius:99,
              background:'var(--meny)', color:'#fff',
              fontSize:11, fontWeight:700, padding:'0 4px',
              display:'grid', placeItems:'center',
            }}>{cartCount}</span>
          )}
        </button>
      </div>

      {/* messages */}
      <div className="scroll" style={{ flex:1, overflowY:'auto', padding:'16px 14px 8px', display:'flex', flexDirection:'column', gap:4 }}>
        {messages.length === 0 ? (
          <div className="fade-up" style={{ paddingTop:8 }}>
            <div style={{ display:'flex', gap:12, alignItems:'flex-start', marginBottom:20 }}>
              <AIOrb size={48} phase="idle"/>
              <div>
                <div style={{ fontFamily:'monospace', fontSize:10, letterSpacing:'.08em', color:'var(--ink-3)', marginBottom:4, textTransform:'uppercase' }}>MENY AI</div>
                <div style={{ fontFamily:'var(--serif)', fontSize:26, lineHeight:1.15 }}>
                  {greeting}<br/>
                  <span style={{ color:'var(--ink-3)', fontSize:20 }}>{t.sub}</span>

                </div>
              </div>
            </div>

            <div style={{ marginBottom:10 }}>
              <div style={{ fontFamily:'monospace', fontSize:10, letterSpacing:'.1em', textTransform:'uppercase', color:'var(--ink-3)', marginBottom:10 }}>
                {t.tryThese}
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {(QUICK_PROMPTS[lang] || QUICK_PROMPTS.en).map(p => (
                  <button key={p.id} onClick={()=>{onClearSuggestions(); onSend(p.text, false);}} style={{
                    display:'flex', alignItems:'center', gap:10,
                    padding:'13px 16px', background:'var(--paper)',
                    border:'1px solid var(--hair-2)', borderRadius:'var(--r-md)',
                    cursor:'pointer', textAlign:'left', fontSize:15, fontWeight:500,
                    transition:'background .14s',
                  }}>
                    <span style={{
                      width:32, height:32, borderRadius:'50%', background:'var(--cream-2)',
                      display:'grid', placeItems:'center', fontSize:16, flexShrink:0,
                    }}>{p.emoji}</span>
                    <span style={{ flex:1 }}>{p.text}</span>
                    <I.arrow size={15} stroke="var(--ink-3)"/>
                  </button>
                ))}
              </div>
            </div>
          </div>
        ) : (
          messages.map((m, i) => (
            <Bubble key={i} from={m.role==='user'?'user':'ai'}>
              {m.role==='user' ? m.content : renderMarkdown(m.content)}
            </Bubble>
          ))
        )}
        {isLoading && <TypingDots/>}

        {/* FIX #10: follow-up suggestion chips after AI responds */}
        {!isLoading && suggestedReplies.length > 0 && (
          <div className="fade-up" style={{ marginTop:6, marginBottom:4 }}>
            <div className="h-scroll">
              {suggestedReplies.map((val, i) => {
                const label = t.followUpLabels ? t.followUpLabels[i] : val;
                return (
                  <button key={i} className="chip" onClick={()=>handleChip(val)}
                    style={{ fontSize:13, color:'var(--ink-2)' }}>
                    {label}
                  </button>
                );
              })}
            </div>
          </div>
        )}

        <div ref={bottomRef}/>
      </div>

      {/* input bar */}
      <div style={{
        padding:'10px 12px',
        paddingBottom:`calc(14px + var(--safe-b))`,
        background:'rgba(251,247,238,.94)',
        backdropFilter:'blur(20px) saturate(160%)',
        borderTop:'1px solid var(--hair-2)',
      }}>
        <div style={{
          display:'flex', gap:8, alignItems:'center',
          background:'var(--paper)', borderRadius:999,
          border:'1px solid var(--hair)', padding:'6px 6px 6px 16px',
        }}>
          <input
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&submit()}
            placeholder={t.tapSpeak}
            style={{
              flex:1, border:'none', background:'transparent', outline:'none',
              fontFamily:'var(--sans)', fontSize:16, color:'var(--ink)',
            }}
          />
          <button onClick={onVoice} style={{
            width:38, height:38, borderRadius:'50%', border:'none',
            background:'var(--cream-2)', display:'grid', placeItems:'center',
            color:'var(--ink-2)', cursor:'pointer',
          }}><I.mic size={17}/></button>
          <button onClick={submit} disabled={!input.trim()} style={{
            width:38, height:38, borderRadius:'50%', border:'none',
            background: input.trim() ? 'var(--meny)' : 'var(--cream-2)',
            color: input.trim() ? '#fff' : 'var(--ink-3)',
            display:'grid', placeItems:'center', cursor: input.trim() ? 'pointer' : 'default',
            transition:'background .15s',
          }}><I.send size={16}/></button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════
function App() {
  // FIX #5: skip onboarding if already seen
  const [screen, setScreen]     = useState(() => localStorage.getItem('meny_seen') ? 'chat' : 'onboarding');
  // Language: persist across sessions
  const [lang, setLang]         = useState(() => localStorage.getItem('meny_lang') || 'no');
  // FIX #4: restore cart from localStorage; also restore messages so cart has context
  const [messages, setMessages] = useState(() => {
    try { const s = localStorage.getItem('meny_messages'); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const [cart, setCart]         = useState(() => {
    try { const s = localStorage.getItem('meny_cart'); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const [isLoading, setLoading] = useState(false);
  const [voiceOpen, setVoiceOpen] = useState(false);
  const [cartOpen, setCartOpen]   = useState(false);
  const [orderOpen, setOrderOpen] = useState(false);
  const [sending, setSending]     = useState(false);
  const [toast, setToast]         = useState(null);
  const [orderId, setOrderId]     = useState(null);
  const [isDemo, setIsDemo]       = useState(false);
  const [successDemo, setSuccessDemo] = useState(false);
  // FIX #10: follow-up chips state
  const [suggestedReplies, setSuggestedReplies] = useState([]);
  const toastTimer = useRef(null);

  // FIX #13: remove loading screen once app renders
  useEffect(() => {
    const el = document.getElementById('app-loading');
    if (el) el.style.display = 'none';
  }, []);

  // FIX #4: persist cart to localStorage whenever it changes
  useEffect(() => {
    localStorage.setItem('meny_cart', JSON.stringify(cart));
  }, [cart]);

  // Persist messages so cart has context after refresh
  useEffect(() => {
    // Only keep last 30 messages to avoid bloating localStorage
    localStorage.setItem('meny_messages', JSON.stringify(messages.slice(-30)));
  }, [messages]);

  const showToast = useCallback((msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2200);
  }, []);

  // ── Send message to AI ───────────────────────────────────────────
  // FIX #3: fromVoice param — TTS only when triggered by voice
  // FIX #11: cart sent to API so Claude knows current state
  // FIX #12: handle removeItems from API
  const sendMessage = useCallback(async (text, fromVoice = false) => {
    if (!text?.trim() || isLoading) return;
    setSuggestedReplies([]);   // clear chips on new send
    const userMsg = { role:'user', content:text };
    const newMsgs = [...messages, userMsg];
    setMessages(newMsgs);
    setLoading(true);

    try {
      const res = await fetch('/api/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ messages: newMsgs, lang, cart }),
      });
      const data = await res.json();
      if (data.error && !data.text) throw new Error(data.error);

      const aiMsg = { role:'assistant', content: data.text || (T[lang]||T.en).connectionError };
      setMessages(m => [...m, aiMsg]);

      if (data.cartItems?.length > 0) {
        setCart(prev => mergeCart(prev, data.cartItems));
        showToast(`${data.cartItems.length} ${T[lang].addedToCart}`);
      }

      // FIX #12: remove items from cart
      if (data.removeItems?.length > 0) {
        setCart(prev => {
          const filtered = prev.filter(item =>
            !data.removeItems.some(name => item.name.toLowerCase().includes(name.toLowerCase()))
          );
          if (filtered.length < prev.length) {
            showToast(`${prev.length - filtered.length} ${T[lang].removedFromCart}`);
          }
          return filtered;
        });
      }

      if (data.demo) setIsDemo(true);

      // FIX #3: only speak on voice
      if (fromVoice && data.text) speak(data.text, lang);

      // FIX #10: show follow-up chips if items were added
      if (data.cartItems?.length > 0 || newMsgs.length > 1) {
        setSuggestedReplies(T[lang].followUps);
      }
    } catch (e) {
      console.error('Chat error:', e);
      setMessages(m => [...m, { role:'assistant', content: (T[lang]||T.en).connectionError }]);
    } finally {
      setLoading(false);
    }
  }, [messages, lang, isLoading, showToast, cart]);

  // ── Send order ───────────────────────────────────────────────────
  // FIX #7: deliveryAddress forwarded to backend
  const sendOrder = useCallback(async ({ name, email, phone, address, notes }) => {
    setSending(true);
    try {
      const res = await fetch('/api/send-order', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          cart, customerName:name, customerEmail:email,
          customerPhone:phone, deliveryAddress:address,
          notes, chatHistory:messages,
        }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Failed');
      setOrderId(data.orderId);
      setSuccessDemo(!!data.demo);
      setCart([]);
      setMessages([]);
      setSuggestedReplies([]);
      setOrderOpen(false);
      setCartOpen(false);
      setScreen('success');
    } catch (e) {
      console.error('Order error:', e);
      alert((T[lang]||T.en).orderError);
    } finally {
      setSending(false);
    }
  }, [cart, messages, lang]);

  // ── Cart ops ─────────────────────────────────────────────────────
  const updateQty = useCallback((id, qty) => {
    setCart(prev => qty <= 0 ? prev.filter(i=>i.id!==id) : prev.map(i=>i.id===id ? {...i,qty} : i));
  }, []);

  const deleteItem = useCallback((id) => {
    setCart(prev => prev.filter(i => i.id !== id));
  }, []);

  const clearCart = useCallback(() => setCart([]), []);

  // FIX #5: mark onboarding seen in localStorage
  const onboardingDone = () => {
    localStorage.setItem('meny_seen', '1');
    setScreen('chat');
  };

  const reset = () => {
    setMessages([]);
    setCart([]);
    setIsDemo(false);
    setSuggestedReplies([]);
    localStorage.removeItem('meny_messages');
    setScreen('chat');
  };

  const clearChat = useCallback(() => {
    setMessages([]);
    setCart([]);
    setIsDemo(false);
    setSuggestedReplies([]);
    localStorage.removeItem('meny_messages');
    localStorage.removeItem('meny_cart');
  }, []);

  // Persist lang choice and sync html[lang] attribute
  const changeLang = useCallback((newLang) => {
    if (!LANGS.includes(newLang)) return;
    setLang(newLang);
    localStorage.setItem('meny_lang', newLang);
  }, []);
  useEffect(() => { document.documentElement.lang = lang; }, [lang]);

  // ── Screens ──────────────────────────────────────────────────────
  if (screen === 'onboarding') {
    return (
      <div className="app-shell">
        <ErrorBoundary>
          <OnboardingScreen onDone={onboardingDone} lang={lang} setLang={setLang} hasActiveSession={messages.length > 0}/>
        </ErrorBoundary>
      </div>
    );
  }

  if (screen === 'success') {
    return (
      <div className="app-shell">
        <ErrorBoundary>
          <SuccessScreen orderId={orderId} lang={lang} onReset={reset} isDemo={successDemo}/>
        </ErrorBoundary>
      </div>
    );
  }

  return (
    <div className="app-shell">
      <ErrorBoundary>
        <ChatScreen
          messages={messages} isLoading={isLoading} cart={cart}
          lang={lang} isDemo={isDemo}
          suggestedReplies={suggestedReplies}
          onClearSuggestions={() => setSuggestedReplies([])}
          onSend={sendMessage}
          onVoice={()=>setVoiceOpen(true)}
          onCartOpen={()=>setCartOpen(true)}
          onLangChange={changeLang}
          onHome={() => setScreen('onboarding')}
          onClearChat={clearChat}
        />

        {voiceOpen && (
          <VoiceOverlay
            lang={lang}
            onClose={()=>setVoiceOpen(false)}
            onTranscript={(txt)=>{ setVoiceOpen(false); sendMessage(txt, true); }}
          />
        )}

        {cartOpen && (
          <CartPanel
            cart={cart} lang={lang}
            onClose={()=>setCartOpen(false)}
            onUpdateQty={updateQty}
            onDeleteItem={deleteItem}
            onClearCart={()=>{ clearCart(); }}
            onOrder={()=>{ setCartOpen(false); setOrderOpen(true); }}
          />
        )}

        {orderOpen && (
          <OrderFormModal
            cart={cart} lang={lang}
            onClose={()=>setOrderOpen(false)}
            onSend={sendOrder}
            sending={sending}
          />
        )}

        {toast && <Toast msg={toast}/>}
      </ErrorBoundary>
    </div>
  );
}

// Surface uncaught JS errors as visible text instead of a blank screen
window.addEventListener('error', (e) => {
  const el = document.getElementById('app-loading');
  if (el) {
    el.innerHTML = `<div style="font-family:monospace;font-size:13px;padding:32px;color:#D62828;max-width:600px;word-break:break-word;">
      <strong>MENY AI — startup error</strong><br><br>
      ${e.message}<br><br>
      ${e.filename}:${e.lineno}:${e.colno}
    </div>`;
    el.style.display = 'flex';
  }
});
window.addEventListener('unhandledrejection', (e) => {
  const el = document.getElementById('app-loading');
  if (el) {
    el.innerHTML = `<div style="font-family:monospace;font-size:13px;padding:32px;color:#D62828;max-width:600px;word-break:break-word;">
      <strong>MENY AI — unhandled promise</strong><br><br>${e.reason}
    </div>`;
    el.style.display = 'flex';
  }
});

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary>
    <App/>
  </ErrorBoundary>
);
</script>
</body>
</html>
